version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd web-app
        - npm ci
    build:
      commands:
        - npm run build
        - cp -r .next/static .next/standalone/.next/static
        - cp -r public .next/standalone/public
        - node scripts/gen-amplify-manifest.mjs
  artifacts:
    baseDirectory: web-app/.next/standalone
    files:
      - '**/*'
  cache:
    paths:
      - web-app/.next/cache/**/*
      - web-app/node_modules/**/*
